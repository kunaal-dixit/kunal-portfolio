<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440" font-family="Arial, Helvetica, sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="440" fill="#ffffff"/>
<rect x="230" y="30" width="220" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text x="340" y="52" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">What do you need to do?</text><text x="340" y="70" text-anchor="middle" font-size="12" fill="#444441">Start here</text>
<line x1="340" y1="80" x2="340" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="120" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="110" y="145" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">getter</text><text x="110" y="164" text-anchor="middle" font-size="12" fill="#534AB7">Compute a value</text>
<rect x="195" y="120" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="265" y="145" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">setter</text><text x="265" y="164" text-anchor="middle" font-size="12" fill="#0F6E56">React to a prop</text>
<rect x="350" y="120" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="420" y="145" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">connectedCallback</text><text x="420" y="164" text-anchor="middle" font-size="12" fill="#185FA5">One-time setup</text>
<rect x="505" y="120" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="575" y="145" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">renderedCallback</text><text x="575" y="164" text-anchor="middle" font-size="12" fill="#854F0B">Touch the DOM</text>
<rect x="40" y="220" width="140" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="110" y="249" text-anchor="middle" font-size="12" fill="#534AB7">Derived display</text><text x="110" y="267" text-anchor="middle" font-size="12" fill="#534AB7">value from</text><text x="110" y="285" text-anchor="middle" font-size="12" fill="#534AB7">existing state</text>
<line x1="110" y1="176" x2="110" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="195" y="220" width="140" height="76" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="265" y="249" text-anchor="middle" font-size="12" fill="#0F6E56">A specific @api</text><text x="265" y="267" text-anchor="middle" font-size="12" fill="#0F6E56">value changed,</text><text x="265" y="285" text-anchor="middle" font-size="12" fill="#0F6E56">no DOM needed</text>
<line x1="265" y1="176" x2="265" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="350" y="220" width="140" height="76" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="420" y="249" text-anchor="middle" font-size="12" fill="#185FA5">Fetch data,</text><text x="420" y="267" text-anchor="middle" font-size="12" fill="#185FA5">subscribe, run</text><text x="420" y="285" text-anchor="middle" font-size="12" fill="#185FA5">once on insert</text>
<line x1="420" y1="176" x2="420" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="505" y="220" width="140" height="76" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="575" y="249" text-anchor="middle" font-size="12" fill="#854F0B">Measure, focus,</text><text x="575" y="267" text-anchor="middle" font-size="12" fill="#854F0B">init a library,</text><text x="575" y="285" text-anchor="middle" font-size="12" fill="#854F0B">scroll, query DOM</text>
<line x1="575" y1="176" x2="575" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="80" y="332" width="520" height="80" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text x="340" y="358" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">The dividing line</text><text x="340" y="380" text-anchor="middle" font-size="12" fill="#444441">Getters, setters, and connectedCallback all work on data, before paint.</text><text x="340" y="398" text-anchor="middle" font-size="12" fill="#444441">renderedCallback is the only one that works on the DOM, after paint.</text>
</svg>
